<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Starlight Journey · Me</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            color: #f0e9dd;
            min-height: 100vh;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        header {
            position: sticky;
            top: 0;
            z-index: 30;
            background: rgba(10, 15, 30, 0.75);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #ffdca866;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto;
            padding: 1rem 2rem;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.5rem;
            background: linear-gradient(130deg, #f9e0a0, #e5b87b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 1.2rem;
            list-style: none;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: #eadbc0;
            text-decoration: none;
            transition: 0.2s;
            font-size: 0.95rem;
        }
        .nav-links a:hover {
            color: #f3c57b;
        }
        .container {
            position: relative;
            z-index: 10;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }
        .character-img {
            width: 260px;
            filter: drop-shadow(0 10px 20px #00000055);
            animation: float 3s infinite ease;
            cursor: pointer;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .glow-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 110%;
            height: 110%;
            background: radial-gradient(circle, #ffc28530, #ff9f5a00);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9);}
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.3);}
        }
        .character-wrapper {
            display: inline-block;
            position: relative;
        }
        #typewriter {
            font-size: 1.6rem;
            border-right: 2px solid #ffcf8a;
            display: inline-block;
            background: linear-gradient(135deg, #fff0cf, #fad49c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            opacity: 0.7;
        }
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        .btn {
            background: #1e2238cc;
            backdrop-filter: blur(8px);
            border: 1px solid #f3bc6e;
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            color: #ffefcf;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .btn:hover {
            background: #e5a35e;
            color: #141a2c;
        }
        .speech-bubble {
            position: fixed;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            background: #2a2547dd;
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 0.6rem 1.5rem;
            font-size: 1rem;
            white-space: nowrap;
            border: 1px solid #ffcb8a;
            z-index: 99;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 700px) {
            .character-img {
                width: 180px;
            }
            #typewriter {
                font-size: 1rem;
            }
            .nav-links {
                justify-content: center;
                margin-top: 0.5rem;
            }
            .logo {
                margin-bottom: 0.5rem;
            }
            nav {
                flex-direction: column;
            }
            .btn {
                padding: 0.4rem 1rem;
                font-size: 0.8rem;
            }
            .speech-bubble {
                font-size: 0.8rem;
                white-space: normal;
                width: 80%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <header>
        <nav>
            <div class="logo">✦ Starward ✦</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">🌙 Home</a></li>
                <li><a href="portfolio.html">📖 About Me</a></li>
                <li><a href="design-thinking.html">💡 Design Mind</a></li>
                <li><a href="global-goal.html">🌍 One Wish</a></li>
                <li><a href="accessibility.html">♿ Open Doors</a></li>
                <li><a href="behind-the-curtain.html">🔮 Behind Scenes</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="character-wrapper">
            <img src="myself.jpg" class="character-img" id="mainCharacter">
            <div class="glow-ring"></div>
        </div>

        <div class="intro-text">
            <h1 id="typewriter"></h1>
            <p class="sub">✦ click me · I reply ✦</p>
        </div>

        <div class="action-buttons">
            <button class="btn" id="waveBtn">👋 Wave</button>
            <button class="btn" id="magicBtn">✨ Little Magic</button>
            <button class="btn" id="musicBtn">🎵 Inner sound</button>
        </div>

        <div id="bubble" class="speech-bubble hidden"></div>
    </main>

    <script>
        const MY_NAME = "Sharon Wang";
        
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        function initStars() {
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 2 + 1,
                    alpha: Math.random() * 0.6 + 0.2,
                    speed: 0.03 + Math.random() * 0.08
                });
            }
        }
        
        function drawStars() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let s of stars) {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 240, 200, ${s.alpha + Math.sin(Date.now() * s.speed) * 0.2})`;
                ctx.fill();
            }
            requestAnimationFrame(drawStars);
        }
        
        resizeCanvas();
        initStars();
        drawStars();
        window.addEventListener('resize', () => {
            resizeCanvas();
            initStars();
        });
        
        const character = document.getElementById('mainCharacter');
        const bubble = document.getElementById('bubble');
        
        function showMessage(msg, duration = 1800) {
            bubble.textContent = msg;
            bubble.classList.remove('hidden');
            setTimeout(() => {
                bubble.classList.add('hidden');
            }, duration);
        }
        
        if (character) {
            character.addEventListener('click', () => {
                showMessage("✨ a quiet star thanks you ✨");
            });
            character.addEventListener('mouseenter', () => {
                showMessage("💫 you came", 900);
            });
        }
        
        document.getElementById('waveBtn').addEventListener('click', () => {
            showMessage("👋 hi from another dreamer");
        });
        
        document.getElementById('magicBtn').addEventListener('click', () => {
            showMessage("✨ a small spark just for you ✨");
        });
        
        document.getElementById('musicBtn').addEventListener('click', () => {
            showMessage("🎵 your inner song is beautiful");
        });
        
        const typewriterEl = document.getElementById('typewriter');
        const fullText = "✨ I'm " + MY_NAME + " · a quiet creator";
        let i = 0;
        
        function typeWriter() {
            if (i < fullText.length) {
                typewriterEl.innerHTML += fullText.charAt(i);
                i++;
                setTimeout(typeWriter, 70);
            }
        }
        
        typeWriter();
    </script>
</body>
</html>
